<figure class="c-hero-diagram-v1" aria-labelledby="privacy-hero-caption" data-privacy-hero>
  <div class="c-hero-diagram-v1__canvas" aria-hidden="true">
    <div class="c-hero-diagram-v1__source">
      <span class="c-hero-diagram-v1__chrome"></span>
      <span class="c-hero-diagram-v1__nav"></span>
      <span class="c-hero-diagram-v1__content-line c-hero-diagram-v1__content-line--one"></span>
      <span class="c-hero-diagram-v1__content-line c-hero-diagram-v1__content-line--two"></span>
      <span class="c-hero-diagram-v1__content-line c-hero-diagram-v1__content-line--three"></span>
      <span class="c-hero-diagram-v1__source-highlight"></span>
    </div>
    <div class="c-hero-diagram-v1__connector"></div>
    <div class="c-hero-diagram-v1__zoom">
      <table class="c-hero-diagram-v1__table">
        <thead>
          <tr>
            <th scope="col">App name</th>
            <th scope="col">Last update</th>
            <th scope="col">Status</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>ActiveWell</td>
            <td>10/02/2026</td>
            <td><span class="c-hero-diagram-v1__badge">Stopped</span></td>
            <td>Details</td>
          </tr>
          <tr>
            <td>Wellness Plus</td>
            <td>10/02/2026</td>
            <td><span class="c-hero-diagram-v1__badge c-hero-diagram-v1__badge--active">Active</span></td>
            <td>Stop sharing</td>
          </tr>
          <tr>
            <td>OneRecord</td>
            <td>10/02/2026</td>
            <td><span class="c-hero-diagram-v1__badge c-hero-diagram-v1__badge--error">Expired</span></td>
            <td>Details</td>
          </tr>
          <tr>
            <td>Total Wellness</td>
            <td>10/02/2026</td>
            <td><span class="c-hero-diagram-v1__badge c-hero-diagram-v1__badge--active">Active</span></td>
            <td>Stop sharing</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="c-hero-diagram-v1__annotation-layer">
      <div class="c-hero-diagram-v1__annotation c-hero-diagram-v1__annotation--apps">
        <span class="c-hero-diagram-v1__annotation-line" aria-hidden="true"></span>
        <span class="c-hero-diagram-v1__annotation-label">Apps list</span>
      </div>
      <div class="c-hero-diagram-v1__annotation c-hero-diagram-v1__annotation--status">
        <span class="c-hero-diagram-v1__annotation-line" aria-hidden="true"></span>
        <span class="c-hero-diagram-v1__annotation-label">Sharing status</span>
      </div>
      <div class="c-hero-diagram-v1__annotation c-hero-diagram-v1__annotation--actions">
        <span class="c-hero-diagram-v1__annotation-line" aria-hidden="true"></span>
        <span class="c-hero-diagram-v1__annotation-label">Sharing actions</span>
      </div>
    </div>
  </div>
  <figcaption class="c-hero-diagram-v1__caption" id="privacy-hero-caption">
    Privacy data table expanding from a source interface into an annotated sharing-status view.
  </figcaption>
</figure>
